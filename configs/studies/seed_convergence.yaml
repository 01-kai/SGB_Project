schema_version: 2
config_kind: study
study_type: seed_convergence

reference_config: configs/base.yaml

candidate_seed_counts:
  - 5
  - 10
  - 15
  - 20
  - 25
  - 30
  - 40
  - 50

metrics:
  - E_GMI
  - success_rate
  - D1
  - D2
  - D3
  - D4
  - D5
  - SVC
  - recovery_time

analysis:
  confidence_level: 0.95
  calculate_ci_width: true
  calculate_relative_ci_width: true
  check_framework_ranking: true
  check_threshold_recommendation: true
  diminishing_returns_tolerance: 0.05

outputs:
  directory: outputs/convergence/seeds