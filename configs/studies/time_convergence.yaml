schema_version: 2
config_kind: study
study_type: time_convergence

reference_config: configs/base.yaml
dynamics_config: configs/dynamics.yaml

seed_plan:
  start_seed: 2000
  seed_count: 30

simulation:
  population_size: 50

maximum_horizon: 1000

candidate_horizons:
  - 250
  - 500
  - 1000

metrics:
  - success_rate
  - volume_success_rate
  - mean_operational_readiness
  - D1
  - D2
  - D3
  - D4
  - D5
  - SVC
  - E_GMI_DBL
  - E_GMI_DMM
  - E_GMI_ISF

detection:
  rolling_window: 50
  required_stable_windows: 3
  minimum_step: 200
  slope_tolerance: 0.0005
  mean_difference_tolerance: 0.01
  required_observation_steps: 100

analysis:
  confidence_level: 0.95

outputs:
  directory: outputs/convergence/time