  # P9 — Organization-mix envelopes.
  # Values follow the organization order in base.yaml.
  - code: P9
    name: first_type_heavy
    operation: organization_mix
    value:
      probabilities:
        - 0.55
        - 0.30
        - 0.15

  - code: P9
    name: second_type_heavy
    operation: organization_mix
    value:
      probabilities:
        - 0.25
        - 0.55
        - 0.20

  - code: P9
    name: third_type_heavy
    operation: organization_mix
    value:
      probabilities:
        - 0.25
        - 0.25
        - 0.50

  - code: P9
    name: balanced_types
    operation: organization_mix
    value:
      probabilities:
        - 0.3333333333333333
        - 0.3333333333333333
        - 0.3333333333333333

  # P10 — Beta-shape concentration while preserving every raw mean
  - code: P10
    name: diffuse_beta_shapes
    operation: beta_concentration
    value:
      concentration: 4.0

  - code: P10
    name: moderate_beta_shapes
    operation: beta_concentration
    value:
      concentration: 10.0

  - code: P10
    name: concentrated_beta_shapes
