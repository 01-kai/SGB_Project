  # P6 — D5 subweights
  - code: P6
    name: D5_equal
    operation: dimension_weights
    value:
      dimension: D5
      weights:
        schema_reconciliation_rate: 0.3333333333333333
        api_adherence_rate: 0.3333333333333333
        format_translation_rate: 0.3333333333333333

  - code: P6
    name: D5_reconciliation_heavy
    operation: dimension_weights
    value:
      dimension: D5
      weights:
        schema_reconciliation_rate: 0.60
        api_adherence_rate: 0.20
        format_translation_rate: 0.20

