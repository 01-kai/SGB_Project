        normalized_breach_latency: 0.40
        policy_violation_rate: 0.40

  # P4 — D3 subweights
  - code: P4
    name: D3_equal
    operation: dimension_weights
    value:
      dimension: D3
      weights:
        lineage_rate: 0.3333333333333333
        catalog_coverage: 0.3333333333333333
        catalog_freshness: 0.3333333333333333

  - code: P4
    name: D3_lineage_heavy
