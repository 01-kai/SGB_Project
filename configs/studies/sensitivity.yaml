schema_version: 2
config_kind: study
study_type: sensitivity

configuration:
  status: candidate
  description: >
    Global sensitivity study covering the candidate constants identified
    as P1-P21. P1-P14 and P21 are evaluated directly by this study.
    P15-P20 are linked to the convergence and experiment studies already
    implemented in the project.

reference_config: configs/base.yaml
dynamics_config: configs/dynamics.yaml

parameters:
  direct_sensitivity_codes:
    - P1
    - P2
    - P3
    - P4
    - P5
    - P6
    - P7
    - P8
    - P9
    - P10
    - P11
    - P12
    - P13
    - P14
    - P21

  linked_study_codes:
    - P15
    - P16
    - P17
    - P18
    - P19
    - P20

profiles:
  smoke:
    start_seed: 9000
    seed_count: 2
    population_size: 12
    burn_in_steps: 50
    observation_steps: 20
    terminal_window: 10

  full:
    start_seed: 9000
    seed_count: 30
    population_size: 50
    burn_in_steps: 500
    observation_steps: 100
    terminal_window: 50

analysis:
  confidence_level: 0.95
  framework_ranking_tolerance: 0.0005
  maximum_absolute_egmi_difference: 0.02
  maximum_threshold_difference: 0.10
  minimum_ranking_match_fraction: 0.90
  minimum_dimension_rank_correlation: 0.90
  minimum_maturity_classification_agreement: 0.85

threshold_scan:
  coarse:
    minimum: 0.0
    maximum: 1.0
    step: 0.10

  refinement:
    radius: 0.10
    step: 0.01

shock_defaults:
  security_impact: 0.30
  maximum_network_distance: 3
  distance_decay: 0.50

freshness_model:
  baseline_window: 20
  rationale: >
    For P21, a catalog-freshness score observed at the baseline window
    is transformed under an exponential update-age assumption:
    F(K) = 1 - (1 - F(K0))^(K/K0).
    This assumption must be stated in the methodology and treated as
    part of the sensitivity analysis rather than an empirical fact.

public_calibration:
  P9_complete: false
  note: >
    Alternative organization-mix envelopes are tested here. Final P9
    resolution still requires a documented public-source denominator
    for NDEL-eligible ministries, state enterprises, and private entities.

scenarios:
  # P1 — Framework weighting schemes
  - code: P1
    name: equal_standard_dimensions
    operation: framework_weights
    value:
      DBL:
        D1: 0.20
        D2: 0.20
        D3: 0.20
        D4: 0.20
        D5: 0.20
      DMM:
        D1: 0.20
        D2: 0.20
        D3: 0.20
        D4: 0.20
        D5: 0.20
      ISF:
        D1: 0.18
        D2: 0.18
        D3: 0.18
        D4: 0.18
        D5: 0.18
        SVC: 0.10

  - code: P1
    name: quality_heavy
    operation: framework_weights
    value:
      DBL:
        D1: 0.40
        D2: 0.15
        D3: 0.15
        D4: 0.15
        D5: 0.15
      DMM:
        D1: 0.40
        D2: 0.15
        D3: 0.15
        D4: 0.15
        D5: 0.15
      ISF:
        D1: 0.35
        D2: 0.13
        D3: 0.13
        D4: 0.13
        D5: 0.13
        SVC: 0.13

  - code: P1
    name: security_heavy
    operation: framework_weights
    value:
      DBL:
        D1: 0.15
        D2: 0.40
        D3: 0.15
        D4: 0.15
        D5: 0.15
      DMM:
        D1: 0.15
        D2: 0.40
        D3: 0.15
        D4: 0.15
        D5: 0.15
      ISF:
        D1: 0.13
        D2: 0.35
        D3: 0.13
        D4: 0.13
        D5: 0.13
        SVC: 0.13

  # P2 — D1 subweights
  - code: P2
    name: D1_equal
    operation: dimension_weights
    value:
      dimension: D1
      weights:
        completeness_ratio: 0.3333333333333333
        duplicate_rate: 0.3333333333333333
        schema_pass_rate: 0.3333333333333333

  - code: P2
    name: D1_completeness_heavy
    operation: dimension_weights
    value:
      dimension: D1
      weights:
        completeness_ratio: 0.60
        duplicate_rate: 0.20
        schema_pass_rate: 0.20

  - code: P2
    name: D1_schema_heavy
    operation: dimension_weights
    value:
      dimension: D1
      weights:
        completeness_ratio: 0.20
        duplicate_rate: 0.20
        schema_pass_rate: 0.60

  # P3 — D2 subweights
  - code: P3
    name: D2_equal
    operation: dimension_weights
    value:
      dimension: D2
      weights:
        encryption_coverage: 0.3333333333333333
        normalized_breach_latency: 0.3333333333333333
        policy_violation_rate: 0.3333333333333333

  - code: P3
    name: D2_encryption_heavy
    operation: dimension_weights
    value:
      dimension: D2
      weights:
        encryption_coverage: 0.60
