schema_version: 2
config_kind: study
study_type: population_convergence

reference_config: configs/base.yaml
dynamics_config: configs/dynamics.yaml

seed_plan:
  start_seed: 4000
  seed_count: 30

candidate_population_sizes:
  - 20
  - 50
  - 200

simulation:
  horizon: 1000
  terminal_window: 100

metrics:
  - success_rate
  - volume_success_rate
  - mean_operational_readiness
  - D1
  - D2
  - D3
  - D4
  - D5
  - SVC
  - E_GMI_DBL
  - E_GMI_DMM
  - E_GMI_ISF

analysis:
  confidence_level: 0.95
  material_difference_tolerance: 0.01
  ranking_tolerance: 0.0005

outputs:
  directory: outputs/convergence/population