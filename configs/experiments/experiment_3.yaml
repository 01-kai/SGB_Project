schema_version: 1
config_kind: experiment
experiment_id: 3
experiment_name: maturity_threshold_selection

configuration:
  status: candidate
  description: >
    Evaluate framework GMI thresholds as post-hoc predictors of exchange
    success. Every framework evaluates the same organizations and exchange
    events. A coarse full-range scan is followed by local refinement.

reference_config: configs/base.yaml
dynamics_config: configs/dynamics.yaml

seed_plan:
  start_seed: 7000
  seed_count: 30

simulation:
  population_size: 50
  observation_steps: 200

steady_state:
  maximum_steps: 1000
  rolling_window: 50
  required_stable_windows: 3
  minimum_step: 200
  slope_tolerance: 0.0005
  mean_difference_tolerance: 0.01
  stabilization_buffer: 50
  metrics:
    - mean_operational_readiness
    - D1
    - D2
    - D3
    - D4
    - D5
    - SVC
    - E_GMI_DBL
    - E_GMI_DMM
    - E_GMI_ISF

threshold_scan:
  coarse:
    minimum: 0.0
    maximum: 1.0
    step: 0.10

  refinement:
    radius: 0.10
    step: 0.01

  endpoint_score_rule: minimum
  optimization_metric: f1_score
  tie_breaker: lower_threshold

analysis:
  confidence_level: 0.95

outputs:
  directory: outputs/experiments/experiment_3