schema_version: 1
config_kind: experiment
experiment_id: 1
experiment_name: framework_comparison

configuration:
  status: candidate
  description: >
    Compare DBL, DMM, and ISF on the same framework-independent
    operational trajectories after steady state has been detected.

reference_config: configs/base.yaml
dynamics_config: configs/dynamics.yaml

seed_plan:
  start_seed: 5000
  seed_count: 30

simulation:
  population_size: 50
  terminal_window: 100

steady_state:
  maximum_steps: 1000
  rolling_window: 50
  required_stable_windows: 3
  minimum_step: 200
  slope_tolerance: 0.0005
  mean_difference_tolerance: 0.01
  stabilization_buffer: 50
  metrics:
    - mean_operational_readiness
    - D1
    - D2
    - D3
    - D4
    - D5
    - SVC
    - E_GMI_DBL
    - E_GMI_DMM
    - E_GMI_ISF

analysis:
  confidence_level: 0.95
  ranking_tolerance: 0.0005

maturity_levels:
  cutoffs:
    - 0.20
    - 0.40
    - 0.60
    - 0.80
  labels:
    - initial
    - developing
    - defined
    - managed
    - optimized
  rationale: >
    Equal-width maturity categories are a modeling convention rather
    than empirically measured boundaries.

outputs:
  directory: outputs/experiments/experiment_1