schema_version: 1
config_kind: dynamics

configuration:
  status: candidate
  parameter_category: modeling_judgment
  description: >
    Candidate framework-neutral operational transition rules.
    These values are modeling assumptions rather than empirical
    coefficients and must be evaluated through sensitivity analysis.

success:
  magnitude: 0.001
  rationale: >
    Successful exchanges produce small operational-learning effects
    for both participating organizations.

  changes:
    D1:
      completeness_ratio: 1.0
      duplicate_rate: -1.0
      schema_pass_rate: 1.0

    D3:
      lineage_rate: 1.0
      catalog_coverage: 1.0
      catalog_freshness: 1.0

    D5:
      schema_reconciliation_rate: 1.0
      api_adherence_rate: 1.0
      format_translation_rate: 1.0

failure:
  magnitude: 0.012
  rationale: >
    Failed exchanges affect the operational submetrics associated
    with the observed failure category. The rules do not depend on
    DBL, DMM, ISF, or framework weights.

  changes:
    schema:
      D1:
        schema_pass_rate: -1.0

      D5:
        schema_reconciliation_rate: -1.0

    security:
      D2:
        encryption_coverage: -1.0
        normalized_breach_latency: 1.0
        policy_violation_rate: 1.0

    metadata:
      D3:
        lineage_rate: -1.0
        catalog_coverage: -1.0
        catalog_freshness: -1.0

    regulatory:
      D4:
        rule_pass_rate: -1.0
        consent_propagation_rate: -1.0

recovery:
  gap_fraction_per_step: 0.02
  maximum_adjustment_per_step: 0.002
  rationale: >
    Each submetric gradually moves toward the mean of its configured
    baseline Beta distribution. Recovery is framework-independent.