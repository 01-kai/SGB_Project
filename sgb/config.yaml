simulation:
  N: 50
  T: 500
  seeds: 30
  ba_m: 3

population:
  org_type_distribution:
    government_ministry: 0.40
    state_enterprise: 0.35
    regulated_private_entity: 0.25

  base_distributions:
    D1: [4, 2]
    D2: [3, 2]
    D3: [3, 3]
    D4: [4, 2]
    D5: [3, 2]
    SVC: [3, 2]

exchange:
  min_volume: 10
  max_volume: 2000
  power_law_exponent: 2.1

perturbations:
  security_incident:
    step: 100
    min_impact: 0.3
    max_impact: 0.6
    observation_window: 50

  regulatory_change:
    step: 100
    min_impact: 0.1
    max_impact: 0.3
    adaptation_window: 50

  dq_shock:
    step: 100
    min_impact: 0.1
    max_impact: 0.4
    duration: 30

experiment_3:
  thresholds: [0.3, 0.4, 0.5, 0.6, 0.7, 0.8]

experiment_4:
  beta_profiles:
    low: [1, 3]
    medium_low: [2, 2]
    medium_high: [3, 2]
    baseline_high: [4, 2]
    high: [5, 1]